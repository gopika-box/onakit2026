<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VYMA Onakit 2026</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-green: #1a3a32;
            --accent-gold: #e6a026;
            --cream-bg: #fdfaf1;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--cream-bg);
            color: var(--primary-green);
        }

        /* NAVBAR */
        .navbar {
            background: linear-gradient(90deg, #0f3d2e, #2c6b4f);
            padding: 8px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo img {
            height: 60px; /* 🔥 bigger logo */
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
        }

        /* NAV LINKS */
        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
        }

        .nav-links a:hover {
            color: var(--accent-gold);
        }

        .logout-btn {
            background: rgba(255,255,255,0.1);
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* MOBILE */
        .menu-toggle {
            display: none;
            flex-direction: column;
            cursor: pointer;
        }

        .menu-toggle span {
            width: 22px;
            height: 3px;
            background: white;
            margin: 3px 0;
        }

        @media (max-width: 768px) {
            .menu-toggle { display: flex; }

            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: #0f3d2e;
                padding: 15px 0;
            }

            .nav-links.active { display: flex; }
        }

        .container {
            max-width: 1400px;
            margin: auto;
            padding: 25px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <a href="{% url 'admin_dashboard' %}" class="logo">
        <img src="{% static 'images/logo.png' %}" alt="logo">
        
    </a>

    <div class="menu-toggle" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="nav-links" id="navLinks">
        <a href="{% url 'admin_dashboard' %}">Dashboard</a>
        <a href="{% url 'master_sheet' %}">Master Sheet</a>
        <a href="{% url 'manage_users' %}">Users</a>

        <!-- SAFE LOGOUT -->
        <form method="POST" action="{% url 'logout' %}">
            {% csrf_token %}
            <button class="logout-btn" style="border:none; color:white; cursor:pointer;">
                Logout
            </button>
        </form>
    </div>
</div>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

<script>
function toggleMenu() {
    document.getElementById("navLinks").classList.toggle("active");
}
</script>

</body>
</html>
